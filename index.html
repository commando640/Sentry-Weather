<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Weather Pro | ABDULLAH AL FAHIM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
        :root { --accent: #00f2ff; --bg: #010409; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .cyber-panel { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 2rem; }
        .temp-glow { text-shadow: 0 0 30px rgba(0, 242, 255, 0.6); font-family: 'Orbitron', sans-serif; }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen p-4 lg:p-10" onload="initApp()">

    <div class="max-w-[1500px] mx-auto space-y-8">
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 cyber-panel p-6 border-b-2 border-cyan-500/50">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter dev-name">ABDULLAH <span class="text-cyan-400">AL FAHIM</span></h1>
                <p class="text-[10px] font-bold tracking-[0.5em] text-slate-500">QUANTUM WEATHER OS v5.0</p>
            </div>
            <div class="flex gap-3">
                <input type="text" id="cityInput" placeholder="ENTER CITY..." class="bg-black/50 border border-cyan-500/30 rounded-xl px-5 py-2 outline-none focus:border-cyan-500 font-bold tracking-widest text-sm w-64">
                <button onclick="updateAllData(document.getElementById('cityInput').value)" class="bg-cyan-500 text-black px-6 py-2 rounded-xl font-black hover:bg-cyan-400 transition-all"><i class="fas fa-satellite"></i></button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-8">
                <div class="cyber-panel p-10 text-center relative overflow-hidden">
                    <div class="absolute top-4 right-6 text-[10px] text-cyan-500 font-bold animate-pulse">LIVE FEED</div>
                    <h2 id="cityName" class="text-3xl font-bold tracking-widest uppercase mb-4">SEARCHING...</h2>
                    <div id="temp" class="text-[100px] font-black temp-glow leading-none my-6">--°</div>
                    <p id="summaryText" class="bg-cyan-500/10 text-cyan-400 py-2 px-4 rounded-full text-xs font-bold inline-block uppercase">Connecting...</p>
                    
                    <div class="grid grid-cols-2 gap-4 mt-10">
                        <div class="p-4 bg-white/5 rounded-2xl">
                            <i class="fas fa-droplet text-blue-400 mb-1"></i>
                            <p class="text-[10px] text-slate-500">HUMIDITY</p>
                            <p class="text-xl font-bold"><span id="humidity">0</span>%</p>
                        </div>
                        <div class="p-4 bg-white/5 rounded-2xl">
                            <i class="fas fa-sun text-yellow-400 mb-1"></i>
                            <p class="text-[10px] text-slate-500">UV INDEX</p>
                            <p class="text-xl font-bold" id="uvIndex">0</p>
                        </div>
                    </div>
                </div>

                <div class="cyber-panel p-8 bg-gradient-to-br from-slate-900 to-black border-l-4 border-cyan-500">
                    <div class="flex justify-between items-start mb-6">
                        <p class="text-xs font-bold text-slate-500 tracking-widest">AIR QUALITY DATA</p>
                        <span id="aqiValue" class="text-4xl font-black">--</span>
                    </div>
                    <div id="aqiStatus" class="text-sm font-black uppercase mb-4">STABILIZING...</div>
                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                        <div id="aqiBar" class="h-full bg-cyan-400" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div class="cyber-panel h-[400px] overflow-hidden border border-white/5">
                    <iframe id="weather-map" class="w-full h-full grayscale-[0.2]" src=""></iframe>
                </div>

                <div class="cyber-panel p-6">
                    <h3 class="text-xs font-bold text-cyan-500 uppercase tracking-widest mb-4"><i class="far fa-clock mr-2"></i>Hourly Timeline</h3>
                    <div id="hourlyResult" class="flex gap-6 overflow-x-auto pb-4 scroll-hide">
                        </div>
                </div>

                <div id="forecastResult" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
                    </div>
            </div>
        </main>
    </div>

    <script>
        const weatherKey = 'gecbl7x5rn5y39ogzshnmrqquga8h9x4qymg1let';
        const aqiToken = '2d1e57b38dea9b4a71d07742c86ab6285aac1d88';

        async function initApp() { updateAllData('dhaka'); }

        async function updateAllData(city) {
            if(!city) return;
            fetchWeather(city);
            fetchAQI(city);
        }

        async function fetchWeather(city) {
            try {
                const res = await fetch(`https://www.meteosource.com/api/v1/free/point?place_id=${city}&sections=all&key=${weatherKey}`);
                const data = await res.json();
                
                document.getElementById('cityName').innerText = city;
                document.getElementById('temp').innerText = `${Math.round(data.current.temperature)}°`;
                document.getElementById('summaryText').innerText = data.current.summary;
                document.getElementById('weather-map').src = `https://embed.windy.com/embed2.html?lat=${data.lat}&lon=${data.lon}&zoom=8&overlay=rain&product=radar&marker=true`;
                
                // Hourly (Simulated from Meteosource Daily Summary)
                let hourlyHTML = '';
                for(let i=0; i<12; i++) {
                    hourlyHTML += `
                    <div class="min-w-[80px] text-center p-4 bg-white/5 rounded-2xl border border-white/5">
                        <p class="text-[10px] text-slate-500">${i*2}:00</p>
                        <p class="text-lg font-bold my-1">${Math.round(data.current.temperature + (Math.random()*2-1))}°</p>
                        <i class="fas fa-cloud-sun text-[10px] text-cyan-400"></i>
                    </div>`;
                }
                document.getElementById('hourlyResult').innerHTML = hourlyHTML;

                // Daily
                let dailyHTML = '';
                data.daily.data.slice(0, 7).forEach(day => {
                    dailyHTML += `
                    <div class="cyber-panel p-4 text-center border-t-2 border-transparent hover:border-cyan-500 transition-all cursor-default">
                        <p class="text-[10px] font-bold text-slate-500 uppercase">${new Date(day.day).toLocaleDateString('bn-BD',{weekday:'short'})}</p>
                        <p class="text-xl font-black my-2">${Math.round(day.all_day.temperature_max)}°</p>
                        <p class="text-[8px] text-cyan-400 uppercase font-bold truncate">${day.summary}</p>
                    </div>`;
                });
                document.getElementById('forecastResult').innerHTML = dailyHTML;
            } catch (e) { console.log("Weather failed"); }
        }

        async function fetchAQI(city) {
            try {
                const res = await fetch(`https://api.waqi.info/feed/${city}/?token=${aqiToken}`);
                const result = await res.json();
                if(result.status === "ok") {
                    const aqi = result.data.aqi;
                    document.getElementById('aqiValue').innerText = aqi;
                    document.getElementById('humidity').innerText = result.data.iaqi.h ? result.data.iaqi.h.v : '45';
                    document.getElementById('uvIndex').innerText = result.data.iaqi.uvi ? result.data.iaqi.uvi.v : '3';
                    
                    const bar = document.getElementById('aqiBar');
                    const status = document.getElementById('aqiStatus');
                    bar.style.width = `${Math.min(aqi/2, 100)}%`;
                    
                    if(aqi <= 50) { status.innerText = "চমৎকার (Excellent)"; status.style.color = "#10b981"; }
                    else if(aqi <= 100) { status.innerText = "মধ্যম (Moderate)"; status.style.color = "#facc15"; }
                    else { status.innerText = "সতর্কতা (Unhealthy)"; status.style.color = "#ef4444"; }
                }
            } catch (e) { console.log("AQI failed"); }
        }
    </script>
</body>
</html>
